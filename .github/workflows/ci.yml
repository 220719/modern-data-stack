name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instala Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala uv
        run: pip install uv

      - name: Instala dependencias
        run: uv sync

      - name: Roda testes
        run: uv run pytest tests/ -v --tb=short

      - name: Verifica cobertura
        run: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=20
